name: CI

# Controllo qualita' automatico ad ogni modifica: verifica la sintassi di
# setup-pc.ps1, esegue PSScriptAnalyzer e i test Pester, e controlla che
# l'impronta SHA256 pubblicata sia aggiornata. Gira su Windows (come i PC reali).

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  qualita:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Controllo sintassi (parser PowerShell)
        shell: pwsh
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path './setup-pc.ps1'), [ref]$null, [ref]$errs) | Out-Null
          if ($errs -and $errs.Count -gt 0) {
            $errs | ForEach-Object { Write-Host "ERRORE: $($_.Message) (riga $($_.Extent.StartLineNumber))" }
            throw "setup-pc.ps1 ha $($errs.Count) errori di sintassi."
          }
          Write-Host "Sintassi OK."

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $res = Invoke-ScriptAnalyzer -Path './setup-pc.ps1' -Settings './PSScriptAnalyzerSettings.psd1'
          $res | Format-Table -AutoSize | Out-String | Write-Host
          $errori = @($res | Where-Object { $_.Severity -eq 'Error' })
          if ($errori.Count -gt 0) { throw "PSScriptAnalyzer: $($errori.Count) errori (i warning non bloccano)." }
          Write-Host "PSScriptAnalyzer OK (nessun errore)."

      - name: Test Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0 -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0.0
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $cfg

      - name: Verifica impronta SHA256 aggiornata
        shell: pwsh
        run: |
          if (-not (Test-Path './setup-pc.ps1.sha256')) { throw "Manca setup-pc.ps1.sha256" }
          $reale  = (Get-FileHash './setup-pc.ps1' -Algorithm SHA256).Hash.ToLower()
          $atteso = ((Get-Content './setup-pc.ps1.sha256' -Raw).Trim() -split '\s+')[0].ToLower()
          if ($reale -ne $atteso) {
            throw "SHA256 non aggiornato. Atteso $atteso, reale $reale. Rigenera setup-pc.ps1.sha256."
          }
          Write-Host "SHA256 aggiornato: $reale"
