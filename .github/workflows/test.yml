name: Test PC Facile (Windows + Mac)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica sintassi PowerShell
        shell: pwsh
        run: |
          Write-Host "=== VERIFICA SINTASSI ===" -ForegroundColor Cyan
          $tokens = $null; $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path setup-pc.ps1), [ref]$tokens, [ref]$errs) | Out-Null
          if ($errs -and $errs.Count -gt 0) {
            Write-Host "ERRORI DI SINTASSI:" -ForegroundColor Red
            foreach ($e in $errs) {
              Write-Host ("  riga {0}:{1}  {2}" -f $e.Extent.StartLineNumber, $e.Extent.StartColumnNumber, $e.Message) -ForegroundColor Red
            }
            exit 1
          }
          Write-Host "[OK] Sintassi PowerShell valida!" -ForegroundColor Green

      - name: Verifica winget disponibile
        shell: pwsh
        run: |
          Write-Host "=== VERIFICA WINGET ===" -ForegroundColor Cyan
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            Write-Host "[OK] winget trovato: $(winget --version)" -ForegroundColor Green
          } else {
            Write-Host "[INFO] winget non disponibile su questo runner" -ForegroundColor Yellow
          }

      # Smoke test end-to-end: -Test rende lo script non interattivo e non
      # distruttivo (tutto saltato). Cosi' becca gli errori di RUNTIME, non solo
      # quelli statici, senza installare/modificare nulla sul runner.
      - name: Smoke test (-Test, non distruttivo)
        shell: pwsh
        run: |
          Write-Host "=== SMOKE TEST (-Test) ===" -ForegroundColor Cyan
          $ErrorActionPreference = 'Stop'
          try {
            & ./setup-pc.ps1 -Test
            Write-Host "[OK] Flusso completato senza errori di runtime." -ForegroundColor Green
          } catch {
            Write-Error "Errore di runtime durante lo smoke test: $_"
            exit 1
          }

      # Lo script e' interattivo (Read-Host): eseguirlo in CI si blocca sull'input.
      # Al posto del run interattivo usiamo analisi statica: non si blocca e trova bug reali.
      - name: Analisi statica (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Write-Host "=== PSSCRIPTANALYZER ===" -ForegroundColor Cyan
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          # I runner Windows spesso hanno gia' PSScriptAnalyzer: se c'e', niente
          # rete/PSGallery (che a volte fa flake: "No repository 'PSGallery'").
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            # PSGallery a volte non e' registrato sul runner: lo registro prima di
            # configurarlo, cosi' Set-PSRepository non esplode.
            if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              try { Register-PSRepository -Default -ErrorAction Stop } catch {}
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
            try { Install-PackageProvider -Name NuGet -Force -ErrorAction SilentlyContinue | Out-Null } catch {}
            # Install-Module a volte fallisce per un hiccup di PSGallery: riprovo.
            for ($i = 1; $i -le 3; $i++) {
              try {
                Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -Repository PSGallery -ErrorAction Stop
                break
              } catch {
                Write-Host "Tentativo $i di installazione fallito: $_" -ForegroundColor Yellow
                Start-Sleep -Seconds 10
              }
            }
          }
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "[INFO] PSScriptAnalyzer non disponibile (PSGallery irraggiungibile): salto l'analisi, non blocco la build." -ForegroundColor Yellow
            exit 0
          }
          Import-Module PSScriptAnalyzer -ErrorAction SilentlyContinue
          # Write-Host e' voluto (output colorato interattivo): escludo quella regola.
          $results = Invoke-ScriptAnalyzer -Path setup-pc.ps1 -Severity Error,Warning -ExcludeRule PSAvoidUsingWriteHost
          if ($results) {
            $results | Format-Table -AutoSize | Out-String | Write-Host
            $errs = @($results | Where-Object { $_.Severity -eq 'Error' })
            if ($errs.Count -gt 0) {
              Write-Error "Trovati $($errs.Count) errori PSScriptAnalyzer"
              exit 1
            }
            Write-Host "[INFO] Solo warning, nessun errore bloccante." -ForegroundColor Yellow
          } else {
            Write-Host "[OK] Nessun problema rilevato." -ForegroundColor Green
          }

  test-mac:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verifica sintassi zsh
        run: |
          echo "=== VERIFICA SINTASSI (zsh -n) ==="
          zsh -n setup-mac.sh && echo "[OK] Sintassi zsh valida"

      # Smoke test: --test rende lo script non interattivo e non distruttivo.
      # </dev/null garantisce che non resti bloccato su eventuali input.
      - name: Smoke test (--test, non distruttivo)
        run: |
          echo "=== SMOKE TEST (--test) ==="
          zsh setup-mac.sh --test </dev/null
          echo "[OK] Flusso Mac completato senza errori di runtime"
